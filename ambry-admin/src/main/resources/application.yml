server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/door_window_cabinet_mall?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ambry.common.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

spring.datasource.druid:
  initial-size: 5
  min-idle: 5
  max-active: 20
  max-wait: 60000
  validation-query: SELECT 1
  test-while-idle: true

knife4j:
  enable: true
  production: false
  basic:
    enable: true
    username: admin
    password: admin123

ambry:
  file:
    upload-path: uploads
    public-prefix: /uploads
  security:
    token-secret: door-window-cabinet-mall-secret
    expire-seconds: 604800
